spring:
  application:
    name: notification-service

  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/notifications}
    username: ${POSTGRES_USER:notifications}
    password: ${POSTGRES_PASSWORD:notifications}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      enable-auto-commit: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USER:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

server:
  port: 8084

services:
  customer:
    url: ${CUSTOMER_SERVICE_URL:http://localhost:8081}

sms:
  gateway:
    url: ${SMS_GATEWAY_URL:http://localhost:8099/send}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: notification-service

resilience4j:
  retry:
    instances:
      email-dispatch:
        max-attempts: 3
        wait-duration: 2s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
      sms-dispatch:
        max-attempts: 3
        wait-duration: 1s
  ratelimiter:
    instances:
      sms-dispatch:
        limit-for-period: 100
        limit-refresh-period: 1m
        timeout-duration: 5s

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [%X{correlationId}] - %msg%n"
  level:
    root: INFO
    com.banking.notification: DEBUG
