services:
  # ─── Infrastructure ──────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: [ "CMD", "cub", "zk-ready", "localhost:2181", "30" ]
      interval: 10s
      timeout: 10s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "${KAFKA_LOCALHOST_REDIRECT_PORT}:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:${KAFKA_LOCALHOST_REDIRECT_PORT}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168  # 7 days
      KAFKA_COMPRESSION_TYPE: lz4
    healthcheck:
      test: [ "CMD", "cub", "kafka-ready", "1", "30", "-b", "localhost:9092" ]
      interval: 15s
      timeout: 30s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.name=banking-es
    ports:
      - "${ES_LOCALHOST_REDIRECT_PORT}:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'" ]
      interval: 20s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "${REDIS_LOCALHOST_REDIRECT_PORT}:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_LOCALHOST_REDIRECT_PORT}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog
    ports:
      - "${MAILHOG_SMTP_LOCALHOST_REDIRECT_PORT}:1025"   # SMTP
      - "${MAILHOG_UI_LOCALHOST_REDIRECT_PORT}:8025"     # Web UI

  # ─── Observability ────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:9090/-/healthy" ]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy

  # ─── Application ─────────────────────────────────────────────────
  customer-service:
    image: reporting/customer-service
    build:
      context: ./customer-service
    container_name: customer-service
    ports:
      - "${CUSTOMER_SERVICE_LOCALHOST_REDIRECT_PORT}:${CUSTOMER_SERVICE_PORT}"
    environment:
      SPRING_PROFILES_ACTIVE: local
      POSTGRES_URL: ${CUSTOMER_POSTGRES_URL}
      POSTGRES_USER: ${CUSTOMER_POSTGRES_USER}
      POSTGRES_PASSWORD: ${CUSTOMER_POSTGRES_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:${CUSTOMER_SERVICE_PORT}/actuator/health/liveness" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  product-service:
    image: reporting/product-service
    build:
      context: ./product-service
    container_name: product-service
    ports:
      - "${PRODUCT_SERVICE_LOCALHOST_REDIRECT_PORT}:${PRODUCT_SERVICE_PORT}"
    environment:
      SPRING_PROFILES_ACTIVE: local
      POSTGRES_URL: ${PRODUCT_POSTGRES_URL}
      POSTGRES_USER: ${PRODUCT_POSTGRES_USER}
      POSTGRES_PASSWORD: ${PRODUCT_POSTGRES_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:${PRODUCT_SERVICE_PORT}/actuator/health/liveness" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  transaction-service:
    image: reporting/transaction-service
    build:
      context: ./transaction-service
    container_name: transaction-service
    ports:
      - "${TRANSACTION_SERVICE_LOCALHOST_REDIRECT_PORT}:${TRANSACTION_SERVICE_PORT}"
    environment:
      SPRING_PROFILES_ACTIVE: local
      POSTGRES_URL: ${TRANSACTION_POSTGRES_URL}
      POSTGRES_USER: ${TRANSACTION_POSTGRES_USER}
      POSTGRES_PASSWORD: ${TRANSACTION_POSTGRES_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      CUSTOMER_SERVICE_URL: ${CUSTOMER_SERVICE_URL}
      PRODUCT_SERVICE_URL: ${PRODUCT_SERVICE_URL}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      customer-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:${TRANSACTION_SERVICE_PORT}/actuator/health/liveness" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  notification-service:
    image: reporting/notification-service
    build:
      context: ./notification-service
    container_name: notification-service
    ports:
      - "${NOTIFICATION_SERVICE_LOCALHOST_REDIRECT_PORT}:${NOTIFICATION_SERVICE_PORT}"
    environment:
      SPRING_PROFILES_ACTIVE: local
      POSTGRES_URL: ${NOTIFICATION_POSTGRES_URL}
      POSTGRES_USER: ${NOTIFICATION_POSTGRES_USER}
      POSTGRES_PASSWORD: ${NOTIFICATION_POSTGRES_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      CUSTOMER_SERVICE_URL: ${CUSTOMER_SERVICE_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      customer-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:${NOTIFICATION_SERVICE_PORT}/actuator/health/liveness" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  reporting-service:
    image: reporting/reporting-service
    build:
      context: ./reporting-service
    container_name: reporting-service
    ports:
      - "${REPORTING_SERVICE_LOCALHOST_REDIRECT_PORT}:${REPORTING_SERVICE_PORT}"
    environment:
      SPRING_PROFILES_ACTIVE: local
      POSTGRES_URL: ${REPORTING_POSTGRES_URL}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      ES_URIS: ${ES_URIS}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:${REPORTING_SERVICE_PORT}/actuator/health/liveness" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

volumes:
  es_data:
  redis_data:
  pg_data:
  grafana_data:

networks:
  default:
    name: banking-network
