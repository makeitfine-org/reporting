replicaCount: 3

image:
  repository: ghcr.io/banking/customer-service
  tag: "latest"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8081

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: customers.banking.internal
      paths:
        - path: /api/customers
          pathType: Prefix
  tls: [ ]

resources:
  requests:
    cpu: "500m"
    memory: "512Mi"
  limits:
    cpu: "2000m"
    memory: "1Gi"

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 2

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8081
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: 8081
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# ConfigMap environment variables
config:
  postgresUrl: "jdbc:postgresql://postgres.infra.svc.cluster.local:5432/customers"
  postgresUser: "customers"
  kafkaBootstrapServers: "kafka.infra.svc.cluster.local:9092"
  logLevel: "INFO"

# Secrets (base64-encoded in production; use Vault/SOPS in practice)
secrets:
  postgresPassword: "Y3VzdG9tZXJz"  # 'customers' base64
  kafkaPassword: ""

nodeSelector: { }
tolerations: [ ]
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - customer-service
          topologyKey: kubernetes.io/hostname
