replicaCount: 2

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

config:
  kafkaBootstrapServers: "kafka.staging.infra.svc.cluster.local:9092"
  logLevel: "INFO"

podDisruptionBudget:
  enabled: true
  minAvailable: 1

ingress:
  hosts:
    - host: customers-staging.banking.internal
      paths:
        - path: /api/customers
          pathType: Prefix
