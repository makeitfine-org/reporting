replicaCount: 3

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

resources:
  requests:
    cpu: "500m"
    memory: "512Mi"
  limits:
    cpu: "2000m"
    memory: "1Gi"

config:
  kafkaBootstrapServers: "${MSK_BOOTSTRAP_SERVERS}"
  postgresUrl: "${RDS_URL}"
  logLevel: "INFO"

podDisruptionBudget:
  enabled: true
  minAvailable: 2

ingress:
  hosts:
    - host: transactions.banking.com
      paths:
        - path: /api/transactions
          pathType: Prefix
  tls:
    - secretName: transaction-tls
      hosts:
        - transactions.banking.com

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: app
              operator: In
              values:
                - transaction-service
        topologyKey: kubernetes.io/hostname
