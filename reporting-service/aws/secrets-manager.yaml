AWSTemplateFormatVersion: "2010-09-09"
Description: AWS Secrets Manager entries for Reporting Service

Resources:
  DBCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: /banking/reporting/db-credentials
      Description: PostgreSQL credentials for Reporting Service
      GenerateSecretString:
        SecretStringTemplate: '{"username": "reporting"}'
        GenerateStringKey: password
        PasswordLength: 32
        ExcludeCharacters: '"@/\\'
      Tags:
        - Key: Service
          Value: reporting-service
        - Key: Environment
          Value: production

  KafkaCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: /banking/reporting/kafka-credentials
      Description: MSK Kafka SASL credentials for Reporting Service
      GenerateSecretString:
        SecretStringTemplate: '{"username": "reporting-service"}'
        GenerateStringKey: password
        PasswordLength: 32
        ExcludeCharacters: '"@/\\'
      Tags:
        - Key: Service
          Value: reporting-service

  ElasticsearchCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: /banking/reporting/elasticsearch-credentials
      Description: OpenSearch credentials for Reporting Service
      SecretString: '{"username": "reporting-service", "password": "CHANGE_ME"}'
      Tags:
        - Key: Service
          Value: reporting-service

  RedisAuthSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: /banking/reporting/redis-auth
      Description: ElastiCache Redis AUTH token for Reporting Service
      GenerateSecretString:
        PasswordLength: 64
        ExcludeCharacters: '"@/\\'
      Tags:
        - Key: Service
          Value: reporting-service

  KeycloakClientSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: /banking/reporting/keycloak-client-secret
      Description: Keycloak client secret for JWT validation
      SecretString: '{"client_id": "reporting-service", "client_secret": "CHANGE_ME"}'
      Tags:
        - Key: Service
          Value: reporting-service

  # Rotation schedule for DB credentials
  DBCredentialsRotationSchedule:
    Type: AWS::SecretsManager::RotationSchedule
    Properties:
      SecretId: !Ref DBCredentialsSecret
      RotationRules:
        AutomaticallyAfterDays: 30

Outputs:
  DBCredentialsSecretArn:
    Value: !Ref DBCredentialsSecret
    Export:
      Name: !Sub "${AWS::StackName}-DBCredentialsArn"
  KafkaCredentialsSecretArn:
    Value: !Ref KafkaCredentialsSecret
    Export:
      Name: !Sub "${AWS::StackName}-KafkaCredentialsArn"
