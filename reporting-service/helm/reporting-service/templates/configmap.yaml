apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "reporting-service.fullname" . }}-config
  labels:
    {{- include "reporting-service.labels" . | nindent 4 }}
data:
  KAFKA_BOOTSTRAP_SERVERS: {{ .Values.config.kafkaBootstrapServers | quote }}
  ES_URIS: {{ .Values.config.esUris | quote }}
  KEYCLOAK_JWKS_URI: {{ .Values.config.keycloakJwksUri | quote }}
  REDIS_HOST: {{ .Values.config.redisHost | quote }}
  REDIS_PORT: {{ .Values.config.redisPort | quote }}
  POSTGRES_URL: {{ .Values.config.postgresUrl | quote }}
  POSTGRES_USER: {{ .Values.config.postgresUser | quote }}
  LOGGING_LEVEL_COM_BANKING_REPORTING: {{ .Values.config.logLevel | quote }}
