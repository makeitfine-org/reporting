apiVersion: v1
kind: Secret
metadata:
  name: {{ include "reporting-service.fullname" . }}-secret
  labels:
    {{- include "reporting-service.labels" . | nindent 4 }}
type: Opaque
data:
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  {{- if .Values.secrets.kafkaPassword }}
  KAFKA_PASSWORD: {{ .Values.secrets.kafkaPassword | quote }}
  {{- end }}
