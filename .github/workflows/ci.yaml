name: Reporting Service CI/CD

on:
  push:
    branches: [master, main, develop]
    paths:
      - "reporting-service/**"
      - "pom.xml"
      - ".github/workflows/ci.yaml"
  pull_request:
    branches: [master, main]

env:
  JAVA_VERSION: "21"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/reporting-service

jobs:
  # ──────────────────────────────────────────
  # Stage 1: Code Quality
  # ──────────────────────────────────────────
  code-quality:
    name: "Stage 1 — Code Quality"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run Checkstyle
        run: mvn -pl reporting-service checkstyle:check -q

      - name: Run PMD
        run: mvn -pl reporting-service pmd:check -q

# Temp update
#      - name: OWASP Dependency Check
#        run: |
#          mvn -pl reporting-service org.owasp:dependency-check-maven:check \
#            -DfailBuildOnCVSS=7 \
#            -DsuppressionFile=reporting-service/owasp-suppressions.xml
#        env:
#          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
#        continue-on-error: false

  # ──────────────────────────────────────────
  # Stage 2: Tests
  # ──────────────────────────────────────────
  test:
    name: "Stage 2 — Unit & Integration Tests"
    runs-on: ubuntu-latest
    needs: code-quality
    services:
      docker:
        image: docker:dind
        options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run Unit Tests
        run: |
          mvn -pl reporting-service test \
            -Dtest="com.banking.reporting.unit.**" \
            -Dfailsafe.skipTests=true

      - name: Run Integration Tests (Testcontainers)
        run: |
          mvn -pl reporting-service verify \
            -Dtest="com.banking.reporting.integration.**" \
            -Dsurefire.failIfNoSpecifiedTests=false
        env:
          TESTCONTAINERS_RYUK_DISABLED: "false"

      - name: Check JaCoCo Coverage (≥80%)
        run: mvn -pl reporting-service jacoco:check

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: reporting-service/target/site/jacoco/

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: JUnit Tests
          path: "reporting-service/target/surefire-reports/*.xml"
          reporter: java-junit

